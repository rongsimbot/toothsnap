<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToothSnap - Dentists & Products</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header { 
            text-align: center; 
            color: white; 
            padding: 30px 0;
            margin-bottom: 30px;
        }
        .header h1 { 
            font-size: 3em; 
            margin-bottom: 10px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); 
        }
        .header p { 
            font-size: 1.2em; 
            opacity: 0.9; 
        }
        
        .tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }
        .tab-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid white;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab-btn:hover {
            background: rgba(255,255,255,0.3);
            transform: translateY(-2px);
        }
        .tab-btn.active {
            background: white;
            color: #667eea;
        }
        
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        
        .search-card { 
            background: white; 
            border-radius: 20px; 
            padding: 40px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .search-card h2 {
            color: #667eea;
            margin-bottom: 30px;
            font-size: 2em;
        }
        
        /* Product Filters */
        .product-filters {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .filter-input {
            flex: 1;
            min-width: 250px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
        }
        .filter-input:focus {
            outline: none;
            border-color: #667eea;
        }
        .filter-select {
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            cursor: pointer;
        }
        .filter-select:focus {
            outline: none;
            border-color: #667eea;
        }
        .filter-count {
            color: #666;
            font-size: 0.95em;
            margin-top: 10px;
        }
        
        /* Dentist Form */
        .form-group { 
            margin-bottom: 25px; 
        }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            color: #333; 
            font-weight: 600; 
        }
        .form-group input, .form-group select { 
            width: 100%; 
            padding: 15px; 
            border: 2px solid #e0e0e0; 
            border-radius: 10px; 
            font-size: 1em; 
        }
        .form-group input:focus, .form-group select:focus { 
            outline: none; 
            border-color: #667eea; 
        }
        .search-btn { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 1.2em; 
            font-weight: bold; 
            cursor: pointer; 
            transition: transform 0.2s; 
        }
        .search-btn:hover { 
            transform: scale(1.02); 
        }
        
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .product-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            cursor: pointer;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .product-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 15px;
            background: #f0f0f0;
        }
        .product-title {
            color: #333;
            font-size: 1.1em;
            margin-bottom: 10px;
            min-height: 50px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        .product-price {
            color: #667eea;
            font-size: 1.5em;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .view-product-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .view-product-btn:hover {
            transform: scale(1.05);
        }
        .loading {
            text-align: center;
            color: white;
            font-size: 1.5em;
            padding: 50px;
        }
        .loading::after {
            content: '...';
            animation: dots 1.5s steps(3, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        .error-message {
            background: #ff5252;
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 20px 0;
        }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 2em; }
            .tabs { flex-direction: column; }
            .tab-btn { width: 100%; }
            .product-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
            .product-filters { flex-direction: column; }
            .filter-input, .filter-select { width: 100%; min-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦷 ToothSnap</h1>
            <p>Your Complete Dental Care Solution</p>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('dentists')">🔍 Find a Dentist</button>
            <button class="tab-btn" onclick="showTab('products')">🛒 Shop Products</button>
        </div>
        
        <div id="dentists-tab" class="tab-content active">
            <div class="search-card">
                <h2>Find Your Perfect Dentist</h2>
                <form action="/search" method="GET">
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" name="city" placeholder="Enter your city">
                    </div>
                    <div class="form-group">
                        <label for="state">State</label>
                        <select id="state" name="state">
                            <option value="">Select a state</option>
                            <option value="TX">Texas</option>
                            <option value="CA">California</option>
                            <option value="NY">New York</option>
                            <option value="FL">Florida</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="insurance">Insurance Provider</label>
                        <select id="insurance" name="insurance">
                            <option value="">Select your insurance</option>
                            <option value="1">Aetna</option>
                            <option value="2">Cigna</option>
                            <option value="3">United Healthcare</option>
                            <option value="4">Delta Dental</option>
                            <option value="5">MetLife</option>
                        </select>
                    </div>
                    <button type="submit" class="search-btn">🔍 Search Dentists</button>
                </form>
            </div>
        </div>
        
        <div id="products-tab" class="tab-content">
            <div class="search-card">
                <h2>Dental Products</h2>
                <div class="product-filters">
                    <input type="text" id="product-search" class="filter-input" placeholder="🔍 Search products..." oninput="filterProducts()">
                    <select id="category-filter" class="filter-select" onchange="filterProducts()">
                        <option value="">All Categories</option>
                        <option value="toothbrush">Toothbrushes</option>
                        <option value="toothpaste">Toothpaste</option>
                        <option value="whitening">Teeth Whitening</option>
                        <option value="floss">Floss & Picks</option>
                        <option value="mouthwash">Mouthwash</option>
                        <option value="electric">Electric Tools</option>
                        <option value="holder">Holders & Storage</option>
                        <option value="kids">Kids Products</option>
                        <option value="pet">Pet Dental</option>
                    </select>
                </div>
                <div class="filter-count" id="filter-count"></div>
                <div id="product-loading" class="loading">Loading products</div>
                <div id="product-error" class="error-message" style="display: none;"></div>
                <div id="product-grid" class="product-grid" style="display: none;"></div>
            </div>
        </div>
    </div>
    
    <script>
        let allProducts = [];
        
        function showTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(tabName + '-tab').classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'products' && !window.productsLoaded) {
                loadProducts();
            }
        }
        
        function loadProducts() {
            window.productsLoaded = true;
            const loading = document.getElementById('product-loading');
            const error = document.getElementById('product-error');
            const grid = document.getElementById('product-grid');
            
            fetch('/products-json')
                .then(response => {
                    if (!response.ok) throw new Error('Failed to load products');
                    return response.json();
                })
                .then(products => {
                    allProducts = products;
                    loading.style.display = 'none';
                    error.style.display = 'none';
                    grid.style.display = 'grid';
                    
                    if (products.length === 0) {
                        error.textContent = 'No products available at this time.';
                        error.style.display = 'block';
                        return;
                    }
                    
                    renderProducts(products);
                })
                .catch(error => {
                    loading.style.display = 'none';
                    document.getElementById('product-error').textContent = 'Unable to load products. Please try again later.';
                    document.getElementById('product-error').style.display = 'block';
                    console.error('Error:', error);
                });
        }
        
        function getProductCategory(product) {
            const title = product.title.toLowerCase();
            const tags = (product.tags || '').toLowerCase();
            const combined = title + ' ' + tags;
            
            if (combined.includes('toothbrush') && !combined.includes('holder')) return 'toothbrush';
            if (combined.includes('toothpaste') || combined.includes('tooth paste')) return 'toothpaste';
            if (combined.includes('whitening') || combined.includes('white')) return 'whitening';
            if (combined.includes('floss') || combined.includes('pick')) return 'floss';
            if (combined.includes('mouthwash') || combined.includes('rinse')) return 'mouthwash';
            if (combined.includes('electric') || combined.includes('ultrasonic')) return 'electric';
            if (combined.includes('holder') || combined.includes('dispenser') || combined.includes('storage')) return 'holder';
            if (combined.includes('kid') || combined.includes('baby') || combined.includes('child')) return 'kids';
            if (combined.includes('dog') || combined.includes('cat') || combined.includes('pet')) return 'pet';
            return 'other';
        }
        
        function filterProducts() {
            const searchTerm = document.getElementById('product-search').value.toLowerCase();
            const category = document.getElementById('category-filter').value;
            
            const filtered = allProducts.filter(product => {
                const matchesSearch = product.title.toLowerCase().includes(searchTerm) || 
                                    (product.tags || '').toLowerCase().includes(searchTerm);
                const matchesCategory = !category || getProductCategory(product) === category;
                return matchesSearch && matchesCategory;
            });
            
            renderProducts(filtered);
        }
        
        function renderProducts(products) {
            const grid = document.getElementById('product-grid');
            const countElement = document.getElementById('filter-count');
            
            countElement.textContent = `Showing ${products.length} of ${allProducts.length} products`;
            grid.innerHTML = '';
            
            products.forEach(product => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => window.location = '/product/' + product.id;
                
                const imageUrl = product.images && product.images[0] ? product.images[0].src : 'https://via.placeholder.com/280x200?text=No+Image';
                const price = product.variants && product.variants[0] ? product.variants[0].price : '0.00';
                
                card.innerHTML = `
                    <img src="${imageUrl}" alt="${product.title}" class="product-image" onerror="this.src='https://via.placeholder.com/280x200?text=Image+Not+Available'">
                    <div class="product-title">${product.title}</div>
                    <div class="product-price">$${price}</div>
                    <button class="view-product-btn" onclick="event.stopPropagation(); window.location='/product/${product.id}'">View Details</button>
                `;
                
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
