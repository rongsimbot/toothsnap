<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToothSnap - Find Your Perfect Dentist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            padding: 20px; 
        }
        .container { max-width: 900px; margin: 0 auto; }
        
        .hero-section {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .hero-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }
        
        .header { 
            text-align: center; 
            color: white; 
            padding: 30px 0;
        }
        .header h1 { 
            font-size: 3em; 
            margin-bottom: 10px; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3); 
        }
        .header p { 
            font-size: 1.2em; 
            opacity: 0.9; 
        }
        
        .search-card { 
            background: white; 
            border-radius: 20px; 
            padding: 40px; 
            box-shadow: 0 20px 60px rgba(0,0,0,0.3); 
        }
        .search-form { 
            display: flex; 
            flex-direction: column; 
            gap: 20px; 
        }
        .form-group { 
            display: flex; 
            flex-direction: column; 
        }
        label { 
            font-weight: 600; 
            margin-bottom: 8px; 
            color: #333; 
        }
        input, select { 
            padding: 15px; 
            border: 2px solid #e0e0e0; 
            border-radius: 10px; 
            font-size: 16px; 
            transition: all 0.3s; 
        }
        input:focus, select:focus { 
            outline: none; 
            border-color: #667eea; 
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1); 
        }
        .search-btn { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            padding: 18px; 
            border: none; 
            border-radius: 10px; 
            font-size: 18px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: transform 0.2s; 
        }
        .search-btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 10px 20px rgba(102,126,234,0.3); 
        }
        
        .features { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            margin-top: 40px; 
        }
        .feature { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            text-align: center; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
        }
        .feature-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 15px;
            border-radius: 50%;
            object-fit: cover;
        }
        .feature h3 { 
            color: #667eea; 
            margin-bottom: 10px; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🦷 ToothSnap</h1>
            <p>Find dentists in your area that accept your insurance</p>
        </div>
        
        <div class="hero-section">
            <img src="https://images.unsplash.com/photo-1606811841689-23dfddce3e95?w=900&h=300&fit=crop&q=80" 
                 alt="Professional dental office" 
                 class="hero-image">
        </div>
        
        <div class="search-card">
            <form class="search-form" action="/search" method="GET">
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" id="city" name="city" placeholder="Enter your city">
                </div>
                
                <div class="form-group">
                    <label for="state">State</label>
                    <select id="state" name="state">
                        <option value="">Select state</option>
                        <option value="TX">Texas</option>
                        <option value="CA">California</option>
                        <option value="FL">Florida</option>
                        <option value="NY">New York</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="insurance">Insurance Provider</label>
                    <select id="insurance" name="insurance">
                        <option value="">Any Insurance</option>
                        <option value="1">Aetna</option>
                        <option value="2">Cigna</option>
                        <option value="3">United Healthcare</option>
                        <option value="4">Delta Dental</option>
                        <option value="5">MetLife</option>
                    </select>
                </div>
                
                <button type="submit" class="search-btn">🔍 Find Dentists</button>
            </form>
        </div>
        
        <div class="features">
            <div class="feature">
                <img src="https://images.unsplash.com/photo-1629909613654-28e377c37b09?w=160&h=160&fit=crop&q=80" 
                     alt="Verified dentists" 
                     class="feature-icon">
                <h3>🏥 Verified Dentists</h3>
                <p>Browse thousands of verified dental professionals</p>
            </div>
            <div class="feature">
                <img src="https://images.unsplash.com/photo-1576091160550-2173dba999ef?w=160&h=160&fit=crop&q=80" 
                     alt="Insurance coverage" 
                     class="feature-icon">
                <h3>💳 Insurance Match</h3>
                <p>Find dentists that accept your insurance</p>
            </div>
            <div class="feature">
                <img src="https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?w=160&h=160&fit=crop&q=80" 
                     alt="Dental products" 
                     class="feature-icon">
                <h3>🛒 Dental Products</h3>
                <p>Shop top-rated dental care products</p>
            </div>
        </div>
    </div>
</body>
</html>
